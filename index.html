<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sekutyi 2.0 - Cyber Catch</title>
    <style>
        body { 
            margin: 0; 
            background: #0d0e15; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: 'Courier New', Courier, monospace;
        }
        .ui { 
            font-size: 20px; 
            color: #39ff14; 
            margin-bottom: 15px; 
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
            font-weight: bold;
        }
        /* Pembungkus untuk menyejajarkan Game dan Logo */
        .game-container {
            display: flex;
            align-items: center;
            gap: 15px; /* Jarak antara game dan kolom logo */
        }
        canvas { 
            background: #111424; 
            border: 3px solid #39ff14; 
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.3);
            border-radius: 8px;
        }
        /* Kolom untuk menyusun logo ke bawah */
        .logo-column {
            display: flex;
            flex-direction: column;
            gap: 12px; /* Jarak vertikal antar logo */
            justify-content: center;
        }
        .logo-column img {
            width: 40px; /* Lebar logo (bisa diganti sesuai selera) */
            height: 40px; /* Tinggi logo */
            object-fit: contain; /* Menjaga proporsi logo agar tidak gepeng */
            border-radius: 4px;
            border: 1px solid #00d2ff;
            box-shadow: 0 0 8px rgba(0, 210, 255, 0.3);
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }
        .btn {
            padding: 15px 35px; 
            font-size: 18px; 
            font-weight: bold;
            font-family: inherit;
            background: #1a1d36;
            color: #00d2ff;
            border: 2px solid #00d2ff;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
            user-select: none;
            touch-action: manipulation;
        }
        .btn:active {
            background: #00d2ff;
            color: #000;
            box-shadow: 0 0 20px #00d2ff;
        }
        #restartBtn {
            display: none;
            margin-top: 15px;
            background: #ff0055;
            color: white;
            border-color: #ff0055;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
        }
    </style>
</head>
<body>

    <div class="ui" id="stats">VERSION 2.0 | SKOR: 0 | NYAWA: ❤️❤️❤️</div>
    
    <div class="game-container">
        <!-- Area Game Canvas -->
        <canvas id="gameCanvas" width="300" height="400"></canvas>
        
        <!-- Area Logo Berderet Ke Bawah -->
        <!-- SILAKAN GANTI nama_file_logo_1.png DLL DENGAN NAMA LOGO KAMU -->
        <div class="logo-column">
            <img src="logosekolah.png" alt="Logo 1">
            <img src="logomoko.png" alt="Logo 2">
            <img src="logoic.png" alt="Logo 3">
        </div>
    </div>
    
    <!-- Tombol Restart -->
    <button id="restartBtn" class="btn" onclick="resetGame()">🔄 MAIN LAGI</button>

    <!-- Kontrol Game -->
    <div class="controls" id="moveControls">
        <button id="leftBtn" class="btn">◀ KIRI</button>
        <button id="rightBtn" class="btn">KANAN ▶</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let score = 0, lives = 3, playerX = 125, items = [], gameOver = false;
        let leftPressed = false, rightPressed = false;
        
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');

        leftBtn.onmousedown = leftBtn.ontouchstart = (e) => { e.preventDefault(); leftPressed = true; };
        leftBtn.onmouseup = leftBtn.ontouchend = () => leftPressed = false;
        rightBtn.onmousedown = rightBtn.ontouchstart = (e) => { e.preventDefault(); rightPressed = true; };
        rightBtn.onmouseup = rightBtn.ontouchend = () => rightPressed = false;
        
        function updateUI() {
            let heartIcons = "❤️".repeat(Math.max(0, lives));
            if (lives <= 0) heartIcons = "💀";
            document.getElementById('stats').innerText = `VERSION 2.0 | SKOR: ${score} | NYAWA: ${heartIcons}`;
        }

        function resetGame() {
            score = 0;
            lives = 3;
            playerX = 125;
            items = [];
            gameOver = false;
            document.getElementById('restartBtn').style.display = "none";
            document.getElementById('moveControls').style.display = "flex";
            updateUI();
            loop();
        }

        function drawGameOver() {
            ctx.fillStyle = "rgba(13, 14, 21, 0.85)";
            ctx.fillRect(0, 0, 300, 400);

            ctx.fillStyle = "#ff0055";
            ctx.font = "bold 32px 'Courier New'";
            ctx.textAlign = "center";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ff0055";
            ctx.fillText("GAME OVER", 150, 160);
            
            ctx.fillStyle = "#ffffff";
            ctx.font = "18px 'Courier New'";
            ctx.shadowBlur = 0;
            ctx.fillText(`Skor Akhir: ${score}`, 150, 210);
            ctx.fillStyle = "#52789e";
            ctx.font = "14px 'Courier New'";
            ctx.fillText("Klik tombol di bawah untuk coba lagi", 150, 240);
        }

        function loop() {
            if (gameOver) {
                drawGameOver();
                document.getElementById('restartBtn').style.display = "block";
                document.getElementById('moveControls').style.display = "none";
                return;
            }

            if (leftPressed && playerX > 0) playerX -= 8;
            if (rightPressed && playerX < 260) playerX += 8;
            
            if (Math.random() < 0.03) items.push({x: Math.random() * 260, y: -20});
            
            ctx.clearRect(0, 0, 300, 400);
            
            ctx.textAlign = "left";
            ctx.font = "34px Arial";
            ctx.fillText('👮', playerX, 380);
            
            for (let i = items.length - 1; i >= 0; i--) {
                let it = items[i];
                it.y += 5;
                ctx.fillText('📦', it.x, it.y);
                
                if (it.y > 340 && it.y < 390 && it.x > playerX - 25 && it.x < playerX + 25) {
                    items.splice(i, 1);
                    score += 10;
                    updateUI();
                } 
                else if (it.y > 410) {
                    items.splice(i, 1);
                    lives--;
                    updateUI();
                    if (lives <= 0) {
                        gameOver = true;
                    }
                }
            }
            
            requestAnimationFrame(loop);
        }

        updateUI();
        loop();
    </script>
</body>
</html>
