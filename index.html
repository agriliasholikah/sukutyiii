<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sekutyi: Jagain Pos Ronda</title>
    <style>
        body { margin: 0; background: #2c3e50; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #gameCanvas { background: #34495e; border: 4px solid #f1c40f; border-radius: 8px; max-width: 95vw; max-height: 60vh; }
        .controls { display: flex; gap: 20px; margin-top: 20px; }
        .btn { padding: 20px 40px; font-size: 20px; background: #f1c40f; border: none; border-radius: 50px; color: #2c3e50; font-weight: bold; touch-action: manipulation; }
    </style>
</head>
<body>

    <h2 style="margin: 10px;">SEKUTYI</h2>
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    
    <div class="controls">
        <button class="btn" id="leftBtn">◀ KIRI</button>
        <button class="btn" id="rightBtn">KANAN ▶</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let score = 0, lives = 3, gameOver = false;

        const player = { x: 375, y: 430, width: 50, height: 50, speed: 10 };
        let moveLeft = false, moveRight = false;

        // Kontrol Sentuh
        document.getElementById('leftBtn').addEventListener('touchstart', () => moveLeft = true);
        document.getElementById('leftBtn').addEventListener('touchend', () => moveLeft = false);
        document.getElementById('rightBtn').addEventListener('touchstart', () => moveRight = true);
        document.getElementById('rightBtn').addEventListener('touchend', () => moveRight = false);

        let items = [];
        function spawnItem() {
            if (gameOver) return;
            items.push({ x: Math.random() * 770, y: -30, type: Math.random() > 0.4 ? 'package' : 'cat', speed: 4 + Math.random() * 3 });
            setTimeout(spawnItem, 800);
        }

        function update() {
            if (gameOver) return;
            if (moveLeft && player.x > 0) player.x -= player.speed;
            if (moveRight && player.x < 750) player.x += player.speed;

            for (let i = items.length - 1; i >= 0; i--) {
                items[i].y += items[i].speed;
                if (items[i].y > 500) { items.splice(i, 1); continue; }
                
                // Cek tabrakan
                if (items[i].x < player.x + 50 && items[i].x + 30 > player.x && items[i].y + 30 > 430) {
                    if (items[i].type === 'package') score += 10;
                    else { lives--; if (lives <= 0) gameOver = true; }
                    items.splice(i, 1);
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, 800, 500);
            ctx.fillStyle = '#f1c40f';
            ctx.fillRect(player.x, player.y, 50, 50);
            items.forEach(it => {
                ctx.fillStyle = it.type === 'package' ? '#d35400' : '#e67e22';
                ctx.fillRect(it.x, it.y, 30, 30);
            });
            ctx.fillStyle = 'white';
            ctx.font = '20px Arial';
            ctx.fillText(`Poin: ${score} | Nyawa: ${lives}`, 10, 30);
            if (gameOver) ctx.fillText('GAME OVER!', 350, 250);
            requestAnimationFrame(() => { update(); draw(); });
        }

        spawnItem();
        draw();
    </script>
</body>
</html>
