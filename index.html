<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sekutyi 2.0</title>
    <style>
        body { margin: 0; background: #000; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { background: #222; border: 4px solid #fff; }
        .ui { font-size: 24px; color: yellow; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="ui" id="stats">VERSION 2.0 | Skor: 0 | Nyawa: 3</div>
    <canvas id="gameCanvas" width="300" height="400"></canvas>
    <div style="margin-top: 20px;">
        <button id="leftBtn" style="padding: 20px 40px; font-size: 20px;">◀ KIRI</button>
        <button id="rightBtn" style="padding: 20px 40px; font-size: 20px;">KANAN ▶</button>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let score = 0, lives = 3, playerX = 125, items = [], gameOver = false;
        let leftPressed = false, rightPressed = false;
        
        document.getElementById('leftBtn').ontouchstart = () => leftPressed = true;
        document.getElementById('leftBtn').ontouchend = () => leftPressed = false;
        document.getElementById('rightBtn').ontouchstart = () => rightPressed = true;
        document.getElementById('rightBtn').ontouchend = () => rightPressed = false;
        
        function loop() {
            if (gameOver) return;
            if (leftPressed && playerX > 0) playerX -= 15;
            if (rightPressed && playerX < 250) playerX += 15;
            if (Math.random() < 0.04) items.push({x: Math.random()*250, y: 0});
            
            ctx.clearRect(0, 0, 300, 400);
            ctx.font = '30px Arial';
            ctx.fillText('👮', playerX, 380);
            
            items.forEach((it, i) => {
                it.y += 8; // Kecepatan paket
                ctx.fillText('📦', it.x, it.y);
                
                // Cek Tabrakan
                if (it.y > 350 && it.x > playerX-20 && it.x < playerX+40) {
                    items.splice(i, 1);
                    score += 10;
                    document.getElementById('stats').innerText = `VERSION 2.0 | Skor: ${score} | Nyawa: ${lives}`;
                } 
                // Cek Kalah
                else if (it.y > 400) {
                    items.splice(i, 1);
                    lives--;
                    document.getElementById('stats').innerText = `VERSION 2.0 | Skor: ${score} | Nyawa: ${lives}`;
                    if (lives <= 0) {
                        gameOver = true;
                        alert("GAME OVER! Skor kamu: " + score);
                        location.reload();
                    }
                }
            });
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
