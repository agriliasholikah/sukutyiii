<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sekutyi Game</title>
    <style>
        body { margin: 0; background: #1a1a2e; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { background: #16213e; border: 4px solid #f1c40f; }
        .controls { display: flex; gap: 20px; margin-top: 20px; }
        button { padding: 20px 40px; font-size: 20px; background: #e94560; color: white; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="status" style="font-size:20px; margin-bottom:10px;">Skor: 0</div>
    <canvas id="gameCanvas" width="350" height="500"></canvas>
    <div class="controls">
        <button id="leftBtn">◀ KIRI</button>
        <button id="rightBtn">KANAN ▶</button>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let score = 0, playerX = 150, items = [];
        let leftPressed = false, rightPressed = false;
        
        document.getElementById('leftBtn').ontouchstart = () => leftPressed = true;
        document.getElementById('leftBtn').ontouchend = () => leftPressed = false;
        document.getElementById('rightBtn').ontouchstart = () => rightPressed = true;
        document.getElementById('rightBtn').ontouchend = () => rightPressed = false;
        
        function loop() {
            if (leftPressed && playerX > 0) playerX -= 10;
            if (rightPressed && playerX < 300) playerX += 10;
            if (Math.random() < 0.05) items.push({x: Math.random()*300, y: 0});
            
            ctx.clearRect(0, 0, 350, 500);
            ctx.font = '40px Arial';
            ctx.fillText('👮‍♂️', playerX, 480);
            
            items.forEach((it, i) => {
                it.y += 5;
                ctx.fillText('📦', it.x, it.y);
                if (it.y > 450 && it.x > playerX-20 && it.x < playerX+40) {
                    items.splice(i, 1);
                    score += 10;
                    document.getElementById('status').innerText = "Skor: " + score;
                }
                if (it.y > 500) items.splice(i, 1);
            });
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
